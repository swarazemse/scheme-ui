<!DOCTYPE html>
<html>
<head>
  <title>SchemeSense Results</title>
</head>
<body style="font-family:Arial;background:#f5f5f5;padding:20px;">
<h2>Scheme Results</h2>

<div id="results"></div>

<script>
const params = new URLSearchParams(window.location.search);

const state = params.get("state");
const occupation = params.get("occupation");
const income = params.get("income");

const webhook = "https://swara-zemse.app.n8n.cloud/webhook/scheme-recommend";

fetch(`${webhook}?state=${state}&occupation=${occupation}&income=${income}`)
  .then(res => res.json())
  .then(data => {
    let html = "";

    data.top_schemes.forEach(s => {
      html += `
        <div style="background:white;padding:15px;margin-top:10px;border-radius:10px;">
          <h3>${s.scheme_name}</h3>
          <p>${s.explanation}</p>
        </div>
      `;
    });

    document.getElementById("results").innerHTML = html;
  });
</script>

</body>
</html>
